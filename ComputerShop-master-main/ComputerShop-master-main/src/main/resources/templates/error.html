<!doctype html>
<html class="no-js" lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>ComputerShop || 404 Error - Page Not Found</title>
    <meta name="description" content="The page you are looking for does not exist or has been moved.">
    
    <div th:replace="~{user/fragments/header :: header}"></div>

</head>

<body class="sticky-header">
    <section class="error-page onepage-screen-area">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6">
                    <div class="content" data-sal="slide-up" data-sal-duration="800" data-sal-delay="400">
                        <span class="title-highlighter highlighter-secondary">
                            <i class="fal fa-exclamation-circle"></i> Oops! Something is missing.
                        </span>
                        <h1 class="title">Page Not Found</h1>
                        <p>It seems we can't find the page you're looking for. This page might have been removed, moved, or the URL is incorrect.</p>
                        <a th:href="@{/}" class="axil-btn btn-bg-secondary right-icon">
                            Back to Homepage <i class="fal fa-long-arrow-right"></i>
                        </a>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="thumbnail" data-sal="zoom-in" data-sal-duration="800" data-sal-delay="400">
                        <img th:src="@{/assets/images/others/404.png}" alt="404">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div th:replace="~{user/fragments/footer :: footer}"></div>
</body>
</html>
