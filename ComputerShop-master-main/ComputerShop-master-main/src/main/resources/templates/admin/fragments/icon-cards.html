<div class="row" th:fragment="icon-cards">
    <div class="col-xl-3 col-sm-6 mb-3">
        <div class="card text-white bg-primary o-hidden h-100">
            <div class="card-body">
                <div class="card-body-icon">
                    <i class="fas fa-fw fa-users"></i>
                </div>
                <div class="mr-5" th:text="${userCount} + ' users'">0 users</div>
            </div>
            <a class="card-footer text-white clearfix small z-1" href="/admin/user">
                <span class="float-left">View Details</span>
                <span class="float-right">
                  <i class="fas fa-angle-right"></i>
                </span>
            </a>
        </div>
    </div>
    <div class="col-xl-3 col-sm-6 mb-3">
        <div class="card text-white bg-warning o-hidden h-100">
            <div class="card-body">
                <div class="card-body-icon">
                    <i class="fas fa-fw fa-box"></i>
                </div>
                <div class="mr-5" th:text="${productCount} + ' products'">0 products</div>
            </div>
            <a class="card-footer text-white clearfix small z-1" href="/admin/product">
                <span class="float-left">View Details</span>
                <span class="float-right">
                  <i class="fas fa-angle-right"></i>
                </span>
            </a>
        </div>
    </div>
    <div class="col-xl-3 col-sm-6 mb-3">
        <div class="card text-white bg-success o-hidden h-100">
            <div class="card-body">
                <div class="card-body-icon">
                    <i class="fas fa-fw fa-shopping-cart"></i>
                </div>
                <div class="mr-5" th:text="${orderCount} + ' orders'">0 orders</div>
            </div>
            <a class="card-footer text-white clearfix small z-1" href="/admin/orders">
<!--                <span class="float-left">View Details</span>-->
                <span class="float-right">
                  <i class="fas fa-angle-right"></i>
                </span>
            </a>
        </div>
    </div>
    <div class="col-xl-3 col-sm-6 mb-3">
        <div class="card text-white bg-danger o-hidden h-100">
            <div class="card-body">
                <div class="card-body-icon">
                    <i class="fas fa-fw fa-dollar-sign"></i>
                </div>
                <div class="mr-5" th:text="${#numbers.formatInteger(revenue, 0, 'POINT')} + ' ₫'">0 ₫</div>
            </div>
            <a class="card-footer text-white clearfix small z-1" href="/admin/reports/sales">
<!--                <span class="float-left">View Details</span>-->
                <span class="float-right">
                  <i class="fas fa-angle-right"></i>
                </span>
            </a>
        </div>
    </div>
</div>
